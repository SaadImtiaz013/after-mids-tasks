<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saad's AI</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h3>🤖 Saad AI </h3>
      <select id="persona-selector">
        <option value="default">Default Helper</option>
        <option value="coder">💻 Coding Assistant</option>
        <option value="pirate">🏴‍☠️ Pirate Captain</option>
        <option value="math">📐 Math Tutor</option>
        <option value="sarcastic">😏 Sarcastic Friend</option>
      </select>
    </header>
    <div id="chat-window">
      <div class="message bot">
        <div class="bubble">Hello! Pick a personality above and let's chat.</div>
      </div>
    </div>
    <div id="typing-indicator" class="typing hidden">
      <span></span><span></span><span></span>
    </div>
    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
